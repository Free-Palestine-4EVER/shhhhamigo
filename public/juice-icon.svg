<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#2d6a2e"/>
    </linearGradient>
    <linearGradient id="juice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.1)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Glass body -->
  <path d="M175 160 L195 400 Q200 420 220 420 L292 420 Q312 420 317 400 L337 160 Z" fill="url(#glass)" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
  <!-- Juice fill -->
  <path d="M185 220 L200 400 Q205 415 220 415 L292 415 Q307 415 312 400 L327 220 Z" fill="url(#juice)" opacity="0.9"/>
  <!-- Straw -->
  <rect x="270" y="100" width="10" height="200" rx="5" fill="#dc2626" transform="rotate(-15, 275, 200)"/>
  <!-- Orange slice on rim -->
  <circle cx="310" cy="165" r="35" fill="#fbbf24" stroke="#f59e0b" stroke-width="3"/>
  <line x1="310" y1="140" x2="310" y2="190" stroke="#f59e0b" stroke-width="2"/>
  <line x1="285" y1="165" x2="335" y2="165" stroke="#f59e0b" stroke-width="2"/>
  <line x1="292" y1="147" x2="328" y2="183" stroke="#f59e0b" stroke-width="2"/>
  <line x1="292" y1="183" x2="328" y2="147" stroke="#f59e0b" stroke-width="2"/>
  <!-- Leaf -->
  <ellipse cx="230" cy="130" rx="25" ry="12" fill="#22c55e" transform="rotate(-30, 230, 130)"/>
  <line x1="230" y1="120" x2="230" y2="140" stroke="#16a34a" stroke-width="2" transform="rotate(-30, 230, 130)"/>
  <!-- Shine on glass -->
  <path d="M190 180 Q192 300 200 380" stroke="rgba(255,255,255,0.5)" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
